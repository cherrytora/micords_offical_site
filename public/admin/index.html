<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micords CMS</title>
  </head>
  <body>
    <script>window.CMS_MANUAL_INIT = true</script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'cherrytora/micord_offical_site',
            branch: 'main',
            auth_type: 'pkce',
            app_id: 'Ov23li6aNEDuFyQpOQTn',
          },
          site_url: 'https://cherrytora.github.io/micord_offical_site',
          media_folder: 'public/images',
          public_folder: '/micord_offical_site/images',
          collections: [
            {
              name: 'release-notes',
              label: '更新日誌',
              label_singular: '版本',
              folder: 'src/content/release-notes',
              create: true,
              slug: '{{version}}',
              summary: 'v{{version}} — {{title}}',
              fields: [
                { name: 'version', label: '版本號', widget: 'string', hint: '例：1.2.0' },
                { name: 'date', label: '發布日期', widget: 'date', format: 'YYYY-MM-DD' },
                { name: 'title', label: '標題', widget: 'string' },
                { name: 'summary', label: '摘要', widget: 'string' },
                { name: 'body', label: '內容', widget: 'markdown' }
              ]
            },
            {
              name: 'roadmap',
              label: '即將上線功能',
              label_singular: '功能項目',
              folder: 'src/content/roadmap',
              create: true,
              slug: '{{order}}-{{slug}}',
              summary: '{{quarter}} — {{title}} ({{status}})',
              fields: [
                { name: 'order', label: '排序', widget: 'number', value_type: 'int', hint: '數字越小越前面' },
                { name: 'quarter', label: '季度', widget: 'string', hint: '例：Q2 2026' },
                { name: 'title', label: '標題', widget: 'string' },
                { name: 'desc', label: '說明', widget: 'text' },
                {
                  name: 'status',
                  label: '狀態',
                  widget: 'select',
                  options: [
                    { label: '已上線', value: 'done' },
                    { label: '開發中', value: 'building' },
                    { label: '規劃中', value: 'planned' }
                  ]
                },
                {
                  name: 'features',
                  label: '功能列表',
                  widget: 'list',
                  field: { name: 'item', label: '功能項目', widget: 'string' }
                }
              ]
            },
            {
              name: 'pages',
              label: '頁面內容',
              files: [
                {
                  name: 'home',
                  label: '首頁',
                  file: 'src/content/pages/home.yaml',
                  fields: [
                    { name: 'heroTitle', label: 'Hero 大標題', widget: 'string' },
                    { name: 'heroSubtitle', label: 'Hero 副標題', widget: 'text' },
                    { name: 'ctaPrimary', label: '主要按鈕文字', widget: 'string' },
                    { name: 'painPointsTitle', label: '痛點區標題', widget: 'string' },
                    {
                      name: 'painPoints', label: '痛點列表', widget: 'list',
                      fields: [
                        { name: 'icon', label: 'Emoji', widget: 'string' },
                        { name: 'text', label: '內容', widget: 'string' }
                      ]
                    },
                    { name: 'featuresTitle', label: '功能區標題', widget: 'string' },
                    { name: 'featuresSubtitle', label: '功能區副標題', widget: 'string' },
                    {
                      name: 'features', label: '功能列表', widget: 'list',
                      fields: [
                        { name: 'icon', label: 'Emoji', widget: 'string' },
                        { name: 'title', label: '功能名稱', widget: 'string' },
                        { name: 'desc', label: '功能說明', widget: 'text' }
                      ]
                    },
                    { name: 'storyTitle', label: '品牌故事標題', widget: 'string' },
                    { name: 'storyP1', label: '品牌故事第一段', widget: 'text' },
                    { name: 'storyP2', label: '品牌故事第二段', widget: 'text' },
                    { name: 'storyP3', label: '品牌故事第三段', widget: 'text' },
                    { name: 'ctaTitle', label: 'CTA 標題', widget: 'string' },
                    { name: 'ctaSubtitle', label: 'CTA 副標題', widget: 'text' },
                    { name: 'ctaButton', label: 'CTA 按鈕文字', widget: 'string' },
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
