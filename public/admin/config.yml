backend:
  name: github
  repo: cherrytora/micords_offical_site
  branch: main
  base_url: https://round-butterfly-d457.m85592527.workers.dev

media_folder: public/images
public_folder: /micords_offical_site/images

collections:
  - name: release-notes
    label: "更新日誌"
    label_singular: "版本"
    folder: src/content/release-notes
    create: true
    slug: "{{version}}"
    summary: "v{{version}} - {{title}}"
    fields:
      - {name: version, label: "版本號", widget: string}
      - {name: date, label: "發佈日期", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD"}
      - {name: title, label: "標題", widget: string}
      - {name: summary, label: "摘要", widget: string}
      - {name: body, label: "內容", widget: markdown}

  - name: roadmap
    label: "即將上線功能"
    label_singular: "功能項目"
    folder: src/content/roadmap
    create: true
    slug: "{{order}}-{{slug}}"
    fields:
      - {name: order, label: "排序", widget: number, value_type: int}
      - {name: quarter, label: "季度", widget: string}
      - {name: title, label: "標題", widget: string}
      - {name: desc, label: "說明", widget: text}
      - name: status
        label: "狀態"
        widget: select
        options:
          - {label: "已上線", value: done}
          - {label: "開發中", value: building}
          - {label: "規劃中", value: planned}
      - name: features
        label: "功能列表"
        widget: list
        field: {name: item, label: "功能", widget: string}

  - name: pages
    label: "頁面內容"
    files:
      - name: home
        label: "首頁"
        file: src/content/pages/home.yaml
        fields:
          - {name: heroTitle, label: "Hero 大標題", widget: string}
          - {name: heroSubtitle, label: "Hero 副標題", widget: text}
          - {name: ctaPrimary, label: "主要按鈕文字", widget: string}
          - {name: featuresTitle, label: "功能區標題", widget: string}
          - name: features
            label: "功能列表"
            widget: list
            fields:
              - {name: icon, label: Emoji, widget: string}
              - {name: title, label: "功能名稱", widget: string}
              - {name: desc, label: "功能說明", widget: text}
          - {name: storyTitle, label: "品牌故事標題", widget: string}
          - {name: storyContent, label: "品牌故事內容", widget: text}
          - {name: ctaTitle, label: "CTA 標題", widget: string}
          - {name: ctaButton, label: "CTA 按鈕文字", widget: string}

      - name: tutorial
        label: "使用教學頁"
        file: src/content/tutorial/page.yaml
        fields:
          - {name: pageTitle, label: "頁面標題", widget: string}
          - {name: pageSubtitle, label: "頁面副標題", widget: text}
          - name: sections
            label: "教學章節"
            widget: list
            fields:
              - {name: id, label: "錨點 ID（英文，勿改）", widget: string}
              - {name: title, label: "章節標題", widget: string}
              - {name: desc, label: "章節說明", widget: text}
              - name: steps
                label: "步驟列表"
                widget: list
                field: {name: step, label: "步驟", widget: string}
              - {name: mediaLabel, label: "媒體說明文字", widget: string}
              - {name: youtubeId, label: "YouTube 影片 ID（選填）", widget: string, required: false, hint: "例如網址 https://youtu.be/abc123 的 ID 為 abc123"}
          - {name: ctaTitle, label: "底部 CTA 標題", widget: string}
          - {name: ctaSubtitle, label: "底部 CTA 副標題", widget: text}
          - {name: ctaButton, label: "底部 CTA 按鈕文字", widget: string}
