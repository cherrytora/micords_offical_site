<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  (function () {
    var params = new URLSearchParams(window.location.hash.slice(1));
    var token = params.get('token');
    var error = params.get('error');

    if (error) {
      document.body.textContent = 'OAuth error: ' + decodeURIComponent(error);
      return;
    }

    if (token) {
      var bc = new BroadcastChannel('decap_oauth');
      bc.postMessage({ token: decodeURIComponent(token), provider: 'github' });
      setTimeout(function () { window.close(); }, 300);
    } else {
      document.body.textContent = 'Error: No token received. Check Worker logs.';
    }
  })();
</script>
</body>
</html>
