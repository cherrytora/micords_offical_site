<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  (function () {
    var params = new URLSearchParams(window.location.hash.slice(1));
    var token = params.get('token');
    var error = params.get('error');

    if (error) {
      document.body.textContent = 'Login error: ' + decodeURIComponent(error);
      return;
    }

    if (token && window.opener) {
      var message = 'authorization:github:success:' + JSON.stringify({ token: token, provider: 'github' });
      window.opener.postMessage(message, '*');
      window.close();
    } else if (!token) {
      document.body.textContent = 'Error: No token received.';
    } else {
      document.body.textContent = 'Error: Cannot communicate with CMS window. Please close this and try again.';
    }
  })();
</script>
</body>
</html>
