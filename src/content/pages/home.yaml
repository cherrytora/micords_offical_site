storyTitle: "為什麼做 Micords？"
storyContent: "起因是一隻腎臟病貓咪。每次回診面對醫生詢問，總是翻找筆記、努力回想上週數值。那種無力感，讓我們決定做一個工具：把對貓咪的愛，變成有跡可循的健康紀錄。Micords 由 RiLa Lab 打造，獻給每一位認真照顧毛孩的你。"

ctaTitle: "開始記錄，就是最好的陪伴。"
