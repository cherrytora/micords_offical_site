heroTitle: "懂牠的沈默，更要記住牠每一刻的活潑。"
heroSubtitle: "Micords 讓愛不再只是感覺，而是有跡可循的守護。我們把對貓咪的疼愛，轉化為最細膩的健康紀錄。"
ctaPrimary: "立即為愛貓建立檔案"

painPointsTitle: "照顧貓咪的路上，你是否也曾感到無力？"
painPoints:
  - icon: "📊"
    text: "「上次檢查數值怎麼樣？跟這次比有進步了嗎？」"
  - icon: "💧"
    text: "「牠今天好像沒喝什麼水，是我的錯覺嗎？」"
  - icon: "🏥"
    text: "「在獸醫院面對醫生的詢問，大腦卻一片空白...」"

featuresTitle: "把愛變簡單"
featuresSubtitle: "不再手忙腳亂，用更科學的方式愛牠"
features:
  - icon: "📝"
    title: "日常點滴"
    desc: "隨手記下吃飯、喝水、上廁所。在關鍵時刻發現牠最細微的變化。"
  - icon: "📈"
    title: "健康趨勢"
    desc: "體重與血檢數據自動成長為圖表。不必讀懂數值，看一眼曲線就懂。"
  - icon: "🏥"
    title: "醫療守護"
    desc: "完整的用藥與醫療病歷。看診時不再手忙腳亂，是與醫生溝通的最佳橋樑。"
  - icon: "🔔"
    title: "智慧提醒"
    desc: "疫苗、驅蟲、回診或吃藥。Micords 會準時提醒，不再錯過任何重要事件。"

storyTitle: "為什麼我們做了 Micords？"
storyP1: "一切從一隻腎臟病貓咪開始。每次回診，面對醫生的詢問，我們總是手忙腳亂地翻找筆記、努力回想上週的數值。那種無力感，讓我們決定做點什麼。"
storyP2: "Micords 不是冷冰冰的健康追蹤工具，它是我們對每一位貓奴心意的回應——讓愛不再只是感覺，而是有跡可循的守護。"
storyP3: "我們相信，當你能清楚知道牠吃了多少、喝了多少、指數有沒有改善，那份安心本身就是對牠最深的陪伴。"

ctaTitle: "讓陪伴更有力量。"
ctaSubtitle: "牠的生命只有你，而你的紀錄能讓這份陪伴更長久。不再因為忘記而遺憾，從現在開始守護牠。"
ctaButton: "免費開始使用 Micords"
