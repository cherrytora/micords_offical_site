pageTitle: "使用教學"
pageSubtitle: "照著步驟，幾分鐘就能上手 Micords 的所有功能。"

sections:
  - id: onboarding
    title: "建立你的第一個貓咪檔案"
    desc: "從下載 App 到建立貓咪基本資料，只需 2 分鐘。"
    steps:
      - "下載並安裝 Micords App"
      - "註冊帳號或使用 Google / Apple 登入"
      - "點擊「新增貓咪」，填寫名字、品種、生日與照片"
      - "完成！開始紀錄牠的第一筆資料"
    mediaLabel: "示範影片"

  - id: daily-log
    title: "每日日誌：飲食、飲水與排泄"
    desc: "掌握牠的每日狀況，讓細微的變化無所遁形。"
    steps:
      - "進入貓咪頁面，點擊「新增記錄」"
      - "選擇類型：飲食 / 飲水 / 排泄 / 體重 / 備忘"
      - "填入數量與備註（例如：食慾不佳、顏色異常）"
      - "儲存後可在時間軸回顧所有記錄"
    mediaLabel: "功能示意圖"

  - id: health-trend
    title: "健康趨勢圖：體重與血檢數據"
    desc: "用曲線說話，讓數字不再讓你看不懂。"
    steps:
      - "進入「健康」頁籤"
      - "點擊「新增血檢報告」，輸入日期與各項數值"
      - "系統自動繪製趨勢曲線，標示正常範圍"
      - "與上次數值比較，一眼得知進步或退步"
    mediaLabel: "圖表示意"

  - id: reminders
    title: "智慧提醒：疫苗、驅蟲、回診"
    desc: "從此不漏接任何重要的醫療事件。"
    steps:
      - "進入「提醒」頁籤，點擊「＋新增提醒」"
      - "選擇類型：疫苗 / 驅蟲 / 回診 / 用藥"
      - "設定日期、時間與重複週期"
      - "到時收到推播通知，確認後自動標記完成"
    mediaLabel: "設定流程示意"

  - id: medical-records
    title: "醫療病歷：完整就診記錄"
    desc: "擁有貓咪的完整醫療歷史，看診時再也不慌張。"
    steps:
      - "進入「病歷」頁籤，點擊「新增就診紀錄」"
      - "填寫就診日期、獸醫師、診斷與用藥資訊"
      - "可上傳報告照片或文件"
      - "每次就診皆有完整時間軸，方便向醫生說明"
    mediaLabel: "病歷頁面示意"

ctaTitle: "看完教學，準備好了嗎？"
ctaSubtitle: "立即開始為你的愛貓建立專屬健康檔案。"
ctaButton: "立即體驗"
ctaButtonLink: "https://micords.web.app/"
